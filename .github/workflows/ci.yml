name: CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  melissa-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./melissa-service

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
        
    - name: Lint with Ruff
      run: ruff check .

    - name: Format with Black
      run: black --check .

    - name: Type check with mypy
      run: mypy .
      
    - name: Test with pytest
      run: pytest

  companion-app:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./companion-app

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Setup pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 9

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      
    - name: Rust Cache
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: ./companion-app/src-tauri
        
    - name: Install dependencies
      run: pnpm install --frozen-lockfile=false

    - name: Install Linux dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

    - name: Build frontend
      run: pnpm build

    - name: Lint Rust (Clippy)
      working-directory: ./companion-app/src-tauri
      run: cargo clippy -- -D warnings

    - name: Format Rust (Rustfmt)
      working-directory: ./companion-app/src-tauri
      run: cargo fmt -- --check
