name: Build and Release Melissa

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          
      - name: Install Python dependencies
        working-directory: ./melissa-service
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          
      - name: Build Python Backend (PyInstaller)
        working-directory: ./melissa-service
        run: python build.py
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          
      - name: Install Frontend Dependencies
        working-directory: ./companion-app
        run: pnpm install
        
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
          
      - name: Build Tauri App
        working-directory: ./companion-app
        run: pnpm tauri build
        
      - name: Upload MSI as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: melissa-installer
          path: companion-app/src-tauri/target/release/bundle/msi/*.msi
          
      - name: Create GitHub Release (for tags)
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: companion-app/src-tauri/target/release/bundle/msi/*.msi
